name: Weekly Investment Report

on:
  schedule:
    - cron: "1 18 * * 0"  # 매주 일요일 18:01 UTC = 월요일 03:01 KST
  workflow_dispatch:       # 수동 실행 허용

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install yfinance anthropic

      - name: Run weekly report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python weekly_report.py

      - name: Commit and push report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          git diff --cached --quiet || git commit -m "chore: add weekly report $(date +'%Y-%m-%d')"
          git pull --rebase origin main
          git push
